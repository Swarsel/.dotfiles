name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3  # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install Emacs
        run: nix profile install nixpkgs#emacs

      - name: Install supporting packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Expose system libstdc++ for tree-sitter grammars
        run: |
          mkdir -p "$HOME/cxx-shim"
          ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 "$HOME/cxx-shim/libstdc++.so.6"
          echo "CXX_SHIM=$HOME/cxx-shim" >> "$GITHUB_ENV"

      - name: Install tree-sitter language grammars
        env:
          LD_LIBRARY_PATH: ${{ env.CXX_SHIM }}
        run: |
          emacs --batch \
            --eval "(require 'treesit)" \
            --eval "(setq treesit-language-source-alist
                     '((bash       . (\"https://github.com/tree-sitter/tree-sitter-bash\"))
                       (css        . (\"https://github.com/tree-sitter/tree-sitter-css\"))
                       (javascript . (\"https://github.com/tree-sitter/tree-sitter-javascript\"))
                       (json       . (\"https://github.com/tree-sitter/tree-sitter-json\"))
                       (markdown   . (\"https://github.com/ikatyang/tree-sitter-markdown\"))
                       (nix        . (\"https://github.com/nix-community/tree-sitter-nix\"))
                       (python     . (\"https://github.com/tree-sitter/tree-sitter-python\"))
                       (hcl        . (\"https://github.com/MichaHoffmann/tree-sitter-hcl\"))
                       (yaml       . (\"https://github.com/ikatyang/tree-sitter-yaml\"))))" \
            --eval "(dolist (lang (mapcar #'car treesit-language-source-alist))
                     (unless (treesit-language-available-p lang)
                       (treesit-install-language-grammar lang)))"

      - name: Install htmlize
        env:
          LD_LIBRARY_PATH: ${{ env.CXX_SHIM }}
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"gnu\" . \"https://elpa.gnu.org/packages/\") t)" \
            --eval "(add-to-list 'package-archives '(\"nongnu\" . \"https://elpa.nongnu.org/nongnu/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'htmlize)"

      - name: Prepare site images
        run: |
          mkdir -p site/files/topology
          cp files/topology/topology_small.png site/files/topology/topology_small.png

      - name: Tangle files & export to HTML
        env:
          LD_LIBRARY_PATH: ${{ env.CXX_SHIM }}
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(package-initialize)" \
            --eval "(require 'htmlize)" \
            --eval "(require 'org)" \
            --eval "(setq org-confirm-babel-evaluate nil
                     org-export-use-babel nil
                     org-html-validation-link nil
                     org-export-headline-levels 6
                     org-export-with-broken-links 'mark)" \
            --visit=SwarselSystems.org \
            --funcall org-babel-tangle \
            --funcall org-html-export-to-html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
