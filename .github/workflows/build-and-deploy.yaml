name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3  # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install Emacs
        run: nix profile install nixpkgs#emacs

      - name: Install supporting packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Expose system libstdc++ for tree-sitter grammars
        run: |
          mkdir -p "$HOME/cxx-shim"
          ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 "$HOME/cxx-shim/libstdc++.so.6"
          echo "CXX_SHIM=$HOME/cxx-shim" >> "$GITHUB_ENV"

      - name: Install tree-sitter language grammars
        env:
          LD_LIBRARY_PATH: ${{ env.CXX_SHIM }}
        run: |
          emacs --batch \
            --eval "(require 'treesit)" \
            --eval "(setq treesit-language-source-alist
                     '((bash       . (\"https://github.com/tree-sitter/tree-sitter-bash\"))
                       (css        . (\"https://github.com/tree-sitter/tree-sitter-css\"))
                       (html       . (\"https://github.com/tree-sitter/tree-sitter-html\"))
                       (javascript . (\"https://github.com/tree-sitter/tree-sitter-javascript\"))
                       (json       . (\"https://github.com/tree-sitter/tree-sitter-json\"))
                       (markdown   . (\"https://github.com/ikatyang/tree-sitter-markdown\"))
                       (nix        . (\"https://github.com/nix-community/tree-sitter-nix\"))
                       (python     . (\"https://github.com/tree-sitter/tree-sitter-python\"))
                       (hcl        . (\"https://github.com/MichaHoffmann/tree-sitter-hcl\"))
                       (yaml       . (\"https://github.com/ikatyang/tree-sitter-yaml\"))))" \
            --eval "(dolist (lang (mapcar #'car treesit-language-source-alist))
                     (unless (treesit-language-available-p lang)
                       (treesit-install-language-grammar lang)))"

      - name: Install htmlize and language major modes
        env:
          LD_LIBRARY_PATH: ${{ env.CXX_SHIM }}
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(setq package-install-upgrade-built-in t)" \
            --eval "(add-to-list 'package-archives '(\"gnu\" . \"https://elpa.gnu.org/packages/\") t)" \
            --eval "(add-to-list 'package-archives '(\"nongnu\" . \"https://elpa.nongnu.org/nongnu/\") t)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(dolist (pkg '(transient htmlize nix-mode nix-ts-mode markdown-mode terraform-mode)) (package-install pkg))"

      - name: Prepare site images
        run: |
          mkdir -p site/files/topology
          cp files/topology/topology_small.png site/files/topology/topology_small.png

      - name: Tangle files & export to HTML
        env:
          LD_LIBRARY_PATH: ${{ env.CXX_SHIM }}
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(setq package-install-upgrade-built-in t)" \
            --eval "(package-initialize)" \
            --eval "(require 'htmlize)" \
            --eval "(setq python-indent-guess-indent-offset-verbose nil)" \
            --eval "(advice-add 'display-graphic-p :override (lambda (&rest _) t))" \
            --eval "(advice-add 'color-values :around (lambda (orig color &optional frame) (or (ignore-errors (funcall orig color frame)) (and (stringp color) (= (length color) 7) (= (aref color 0) ?#) (list (* 257 (string-to-number (substring color 1 3) 16)) (* 257 (string-to-number (substring color 3 5) 16)) (* 257 (string-to-number (substring color 5 7) 16)))) '(0 0 0))))" \
            --eval "(setq css-fontify-colors nil)" \
            --eval "(set-face-attribute 'default nil :foreground \"#a0b3c5\" :background \"#1d252c\")" \
            --eval "(set-face-attribute 'font-lock-comment-face nil :foreground \"#41505e\" :slant 'italic)" \
            --eval "(set-face-attribute 'font-lock-comment-delimiter-face nil :foreground \"#41505e\")" \
            --eval "(set-face-attribute 'font-lock-doc-face nil :foreground \"#54677d\" :slant 'italic)" \
            --eval "(set-face-attribute 'font-lock-string-face nil :foreground \"#539afc\")" \
            --eval "(set-face-attribute 'font-lock-keyword-face nil :foreground \"#5ec4ff\" :weight 'bold)" \
            --eval "(set-face-attribute 'font-lock-builtin-face nil :foreground \"#5ec4ff\")" \
            --eval "(set-face-attribute 'font-lock-function-name-face nil :foreground \"#33ccff\")" \
            --eval "(set-face-attribute 'font-lock-variable-name-face nil :foreground \"#718ca1\")" \
            --eval "(set-face-attribute 'font-lock-type-face nil :foreground \"#ebbf83\")" \
            --eval "(set-face-attribute 'font-lock-constant-face nil :foreground \"#ff5e9e\")" \
            --eval "(set-face-attribute 'font-lock-warning-face nil :foreground \"#ff5e9e\")" \
            --eval "(set-face-attribute 'font-lock-preprocessor-face nil :foreground \"#b62d65\")" \
            --eval "(set-face-attribute 'font-lock-negation-char-face nil :foreground \"#5ec4ff\")" \
            --eval "(set-face-attribute 'font-lock-regexp-grouping-construct nil :foreground \"#5ec4ff\" :weight 'bold)" \
            --eval "(set-face-attribute 'font-lock-regexp-grouping-backslash nil :foreground \"#33ccff\")" \
            --eval "(require 'org)" \
            --eval "(defun org-babel-execute:bash (_body _params) \"\")" \
            --eval "(defun org-babel-execute:sh (_body _params) \"\")" \
            --eval "(defun org-babel-execute:shell (_body _params) \"\")" \
            --eval "(defun org-babel-execute:markdown (_body _params) \"\")" \
            --eval "(setq org-confirm-babel-evaluate nil
                     org-html-validation-link nil
                     org-export-headline-levels 6
                     org-export-with-broken-links 'mark
                     org-html-htmlize-output-type 'inline-css)" \
            --visit=SwarselSystems.org \
            --funcall org-babel-tangle \
            --funcall org-html-export-to-html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
